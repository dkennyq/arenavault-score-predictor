services:
  postgres:
    image: postgres:16-alpine
    container_name: arenavault-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ArenaVault2024!
      - POSTGRES_DB=arenavaultdb
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - arenavault-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arenavault-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=arenavaultdb;Username=postgres;Password=ArenaVault2024!
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arenavault-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arenavault-web-ui
    environment:
      - API_URL=${API_URL:-http://localhost:5000/api}
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - arenavault-network

networks:
  arenavault-network:
    driver: bridge

volumes:
  postgres-data:
