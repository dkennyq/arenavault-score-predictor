services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: arenavault-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=ArenaVault2024!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - arenavault-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ArenaVault2024! -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arenavault-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ArenaVaultDB;User Id=sa;Password=ArenaVault2024!;TrustServerCertificate=True;
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - arenavault-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arenavault-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - arenavault-network

networks:
  arenavault-network:
    driver: bridge

volumes:
  sqlserver-data:
