name: CI - Build and Test

on:
  push:
    branches: [ main, develop, 'dkennyq/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-backend:
    name: Build Backend (.NET API)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      working-directory: ./backend/ArenaVault.API
      run: dotnet restore
      
    - name: Build
      working-directory: ./backend/ArenaVault.API
      run: dotnet build --no-restore --configuration Release
      
    - name: Test
      working-directory: ./backend/ArenaVault.API
      run: |
        # TODO: Add test project when available
        # dotnet test --no-build --configuration Release --verbosity normal
        echo "No tests configured yet"
        
  build-frontend:
    name: Build Frontend (HTML/Nginx)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate HTML
      working-directory: ./frontend
      run: |
        # Simple validation that index.html exists and is valid
        if [ ! -f index.html ]; then
          echo "Error: index.html not found"
          exit 1
        fi
        echo "Frontend files validated successfully"
        
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: arenavault-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: arenavault-web-ui:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
