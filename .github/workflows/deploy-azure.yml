name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ACR_NAME: arenavaultacr
  RESOURCE_GROUP: arenavault-rg

jobs:
  build-and-push:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
        
    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/arenavault-api:${{ github.sha }} \
          -t ${{ env.ACR_NAME }}.azurecr.io/arenavault-api:latest \
          ./backend
        docker push ${{ env.ACR_NAME }}.azurecr.io/arenavault-api:${{ github.sha }}
        docker push ${{ env.ACR_NAME }}.azurecr.io/arenavault-api:latest
        
    - name: Build and Push Frontend Image
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/arenavault-web-ui:${{ github.sha }} \
          -t ${{ env.ACR_NAME }}.azurecr.io/arenavault-web-ui:latest \
          ./frontend
        docker push ${{ env.ACR_NAME }}.azurecr.io/arenavault-web-ui:${{ github.sha }}
        docker push ${{ env.ACR_NAME }}.azurecr.io/arenavault-web-ui:latest
        
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Deploy Backend Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: arenavault-api
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/arenavault-api:${{ github.sha }}
        environmentVariables: |
          ASPNETCORE_ENVIRONMENT=Production
          ConnectionStrings__DefaultConnection=${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          
    - name: Deploy Frontend Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: arenavault-web-ui
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/arenavault-web-ui:${{ github.sha }}
        
    - name: Health Check
      run: |
        echo "Waiting for deployment to complete..."
        sleep 30
        
        # Get Container App FQDN
        API_FQDN=$(az containerapp show \
          --name arenavault-api \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --query properties.configuration.ingress.fqdn \
          --output tsv)
        
        # Check API health
        response=$(curl -s -o /dev/null -w "%{http_code}" https://$API_FQDN/api/health)
        
        if [ $response -eq 200 ]; then
          echo "✅ API health check passed"
          echo "API URL: https://$API_FQDN"
        else
          echo "❌ API health check failed with status $response"
          exit 1
        fi
        
    - name: Notify Success
      if: success()
      run: echo "🚀 Deployment to Azure successful!"
      
    - name: Notify Failure
      if: failure()
      run: echo "❌ Deployment to Azure failed!"
