<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArenaVault - Score Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .status {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            display: block;
        }
        
        .status.loading {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
            color: #0c5460;
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-details {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>ArenaVault</h1>
        <p class="subtitle">Arena of Valor Score Predictor</p>
        
        <p style="color: #666; margin-bottom: 20px;">
            Bienvenido al sistema de predicción de puntajes para Arena of Valor
        </p>
        
        <button class="button" onclick="checkSystem()">Verificar Sistema</button>
        
        <div class="spinner" id="spinner"></div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script src="env.js"></script>
    <script>
        // Configuration - from environment variable or auto-detect
        const API_URL = (window.ENV && window.ENV.API_URL) 
            ? window.ENV.API_URL
            : (window.location.hostname === 'localhost' 
                ? 'http://localhost:5000/api'
                : (window.location.protocol + '//' + window.location.hostname.replace('arenavault-web-ui', 'arenavault-api') + '/api'));
        
        function showStatus(message, type, details = '') {
            const statusDiv = document.getElementById('status');
            const spinner = document.getElementById('spinner');
            
            spinner.style.display = 'none';
            statusDiv.className = 'status ' + type;
            statusDiv.innerHTML = `
                <strong>${message}</strong>
                ${details ? '<div class="status-details">' + details + '</div>' : ''}
            `;
        }
        
        function showLoading(message) {
            const statusDiv = document.getElementById('status');
            const spinner = document.getElementById('spinner');
            
            spinner.style.display = 'block';
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '<strong>' + message + '</strong>';
        }
        
        async function checkSystem() {
            showLoading('Verificando estado del sistema...');
            
            try {
                const response = await fetch('api/health');
                const data = await response.json();
                
                if (response.ok) {
                    showStatus(
                        '✅ Sistema operativo',
                        'success',
                        `<strong>API:</strong> ${data.status}<br>` +
                        `<strong>Base de Datos:</strong> ${data.databaseStatus || 'No verificado'}<br>` +
                        `<strong>Mensaje:</strong> ${data.message}<br>` +
                        `<strong>Hora:</strong> ${new Date(data.timestamp).toLocaleString()}`
                    );
                } else {
                    showStatus(
                        '❌ Error en el sistema',
                        'error',
                        `Estado: ${data.status}<br>Mensaje: ${data.message}`
                    );
                }
            } catch (error) {
                showStatus(
                    '❌ No se pudo conectar con el backend',
                    'error',
                    'Asegúrate de que el servidor esté corriendo y accesible.'
                );
            }
        }
    </script>
</body>
</html>
